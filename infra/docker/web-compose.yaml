services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        # Optional: enables the header sign-in affordance and points it at the
        # auth hub. Inlined at build time, so pass them here (not runtime env).
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_AUTH_APP_URL: ${VITE_AUTH_APP_URL:-https://auth.unimatrix-01.dev}
    restart: unless-stopped
