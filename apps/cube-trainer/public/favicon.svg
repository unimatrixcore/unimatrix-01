<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .cell { fill: #49D2AC; }
    .grid { stroke: #06231b; stroke-width: 1.4; }
    @media (prefers-color-scheme: light) {
      .cell { fill: #006045; }
      .grid { stroke: #eafff8; }
    }
  </style>
  <rect x="1" y="1" width="30" height="30" rx="3" class="cell" />
  <g class="grid" fill="none">
    <rect x="1" y="1" width="30" height="30" rx="3" />
    <line x1="11" y1="1" x2="11" y2="31" />
    <line x1="21" y1="1" x2="21" y2="31" />
    <line x1="1" y1="11" x2="31" y2="11" />
    <line x1="1" y1="21" x2="31" y2="21" />
  </g>
</svg>
